<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Sprix(2).css">
    <title>My First Website</title>
</head>
<body>

    <section id="hero-section" class="page-section">
        <span class="section-badge">Home</span>
        <h1>My first Website</h1>
        <p class="highlight">I am learning HTML course with sprix</p>
        
        <div class="cta-buttons">
            <button class="btn-primary">Start Learning</button>
            <a href="https://www.sprix.com" class="link-more">Learn More</a>
        </div>
        
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500" alt="شخص يتعلم البرمجة" class="main-img">
    </section>

    <section id="interests-section" class="page-section">
        <span class="section-badge bg-orange">Body</span>
        <h2>Sports I love to watch</h2>
        <p>I Love watching football</p>
        
        <div class="images-container">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=300" alt="كتاب">
                <p>كتاب</p>
            </div>
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=300" alt="كرة قدم">
                <p>كرة قدم</p>
            </div>
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?w=300" alt="طفل يفكر">
                <p>طفل يفكر</p>
            </div>
        </div>

        <h3>Favorite Video Game</h3>
        <button class="btn-primary">WATCH NOW</button>
    </section>

    <section id="form-section" class="page-section">
        <span class="section-badge bg-green">Form</span>
        <div class="card">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name...">
                
                <label for="sport">Sport:</label>
                <input type="text" id="sport" name="sport" placeholder="Enter your favorite sport...">
                
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </section>

</body>
</html>
